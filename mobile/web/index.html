<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="AURA Care-Chain — adaptação preditiva como serviço: a casa se adapta ao idoso antes da queda. Cuidado domiciliar voz-first, explicável e acessível.">
  <!-- Allow pinch-zoom: accessibility for low-vision / elderly users. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A5276">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AURA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>AURA Care-Chain</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="flutter_bootstrap.css">
  <style id="splash-screen-style">
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background: #F7F5F1;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #10303C;
      -webkit-font-smoothing: antialiased;
    }
    #aura-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #aura-splash .ring {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 3px solid rgba(26, 82, 118, 0.18);
      border-top-color: #1A5276;
      animation: aura-spin 1s linear infinite;
    }
    #aura-splash .wordmark {
      font-family: "Bricolage Grotesque", system-ui, -apple-system, sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #1A5276;
    }
    #aura-splash .tagline {
      font-size: 14px;
      color: #4E5D63;
      letter-spacing: .2px;
    }
    @keyframes aura-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #aura-splash .ring { animation: none; }
    }
  </style>
</head>
<body>
  <div id="aura-splash" aria-label="Carregando AURA Care-Chain">
    <div class="ring"></div>
    <div class="wordmark">AURA</div>
    <div class="tagline">Adaptação preditiva como serviço</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('aura-splash');
      if (splash) splash.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
